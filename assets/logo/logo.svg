<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gr1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#ffe600"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Borde sutil -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#ff6600" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Letra G estilizada -->
  <text x="32" y="44" font-family="Arial Black, sans-serif" font-weight="900" font-size="38"
        text-anchor="middle" fill="url(#gr1)" filter="url(#glow)">G</text>
  <!-- Subrayado naranja -->
  <rect x="12" y="50" width="40" height="3" rx="1.5" fill="url(#gr1)" opacity="0.8"/>
  <!-- Punto de acento arriba derecha -->
  <circle cx="50" cy="14" r="4" fill="#ff6600" opacity="0.9"/>
  <circle cx="50" cy="14" r="2" fill="#ffe600"/>
</svg>
